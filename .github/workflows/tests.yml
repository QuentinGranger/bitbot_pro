name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-mock aioresponses responses
        
    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=bitbot --cov-report=xml --cov-report=term-missing
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
        
    - name: Check code style
      run: |
        pip install black flake8
        black --check bitbot tests
        flake8 bitbot tests --max-line-length=100 --exclude=__pycache__,.git,build
        
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install security tools
      run: |
        pip install bandit safety
        
    - name: Run security checks
      run: |
        bandit -r bitbot -ll
        safety check
        
  integration:
    needs: [test, security]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
        
    - name: Run integration tests
      env:
        BINANCE_API_KEY: ${{ secrets.BINANCE_TESTNET_KEY }}
        BINANCE_API_SECRET: ${{ secrets.BINANCE_TESTNET_SECRET }}
      run: |
        pytest tests/integration/ -v --log-cli-level=INFO
